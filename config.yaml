name: "GrillSense Thermometer"
version: "0.1.0"
slug: "grillsense"
description: "Monitor GrillSense/Dangrill WiFi BBQ thermometer temperatures and alarms via MQTT auto-discovery"
url: "https://github.com/user/grillsense"

arch:
  - amd64
  - aarch64
  - armv7

startup: application
boot: auto

# Host network needed for receiving UDP from the thermometer device
host_network: true
hassio_api: true

options:
  mode: "local"
  udp_port: 17000
  device_name: "GrillSense Thermometer"
  cloud_email: ""
  cloud_password: ""
  mqtt_host: ""
  mqtt_port: 1883
  mqtt_user: ""
  mqtt_pass: ""

schema:
  mode: "list(local|cloud)"
  udp_port: "port"
  device_name: "str"
  cloud_email: "str?"
  cloud_password: "str?"
  mqtt_host: "str?"
  mqtt_port: "port?"
  mqtt_user: "str?"
  mqtt_pass: "str?"
